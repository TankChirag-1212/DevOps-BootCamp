apiVersion: apps/v1  
kind: Deployment
metadata:
  name: catalog
  labels:
    app.kubernetes.io/name: catalog-deployment
spec:
  replicas: 2   
  strategy:
    rollingUpdate:
      maxUnavailable: 1  
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-pod
  template:           
    metadata:
      labels:
        app.kubernetes.io/name: catalog-pod
    spec:
      securityContext:
        fsGroup: 1000           
      containers:
        - name: catalog-container
          envFrom:
            - configMapRef:
                name: catalog-configmap
          securityContext:       
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          image: "public.ecr.aws/aws-containers/retail-store-sample-catalog:1.0.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:           
            httpGet:
              path: /health
              port: 8080                 
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 256Mi