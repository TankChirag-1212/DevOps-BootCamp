apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cart
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TankChirag-1212/DevOps-BootCamp.git
    targetRevision: master
    path: Day-18_27-05-2026_GitOps_ArgoCD/github-files/src/cart/chart
    helm:
      valueFiles:
        - values-cart.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true    # Auto-delete resources not in Git
      selfHeal: true # Auto-sync if drift detected
    syncOptions:
      - CreateNamespace=true
