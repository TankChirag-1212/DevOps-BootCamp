apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-config
data:
  RETAIL_CATALOG_PERSISTENCE_PROVIDER: "mysql"
  RETAIL_CATALOG_PERSISTENCE_ENDPOINT: "mysql-0.mysql.default.svc.cluster.local:3306"
  RETAIL_CATALOG_PERSISTENCE_DB_NAME: "catalogdb"
  # RETAIL_CATALOG_PERSISTENCE_USER: "mysql_user"
  # RETAIL_CATALOG_PERSISTENCE_PASSWORD: "your-pass"
  RETAIL_CATALOG_PERSISTENCE_CONNECT_TIMEOUT: "5"
