name: Build and Push UI Service to ECR

on:
  push:
    branches: [ "master" ]
    paths:
      # - "Day-18_27-05-2026_GitOps_ArgoCD/github-files/src/ui/src/**"
      - ".github/workflows/image-build-push-ui.yaml" # During testing phases only for prod comment this line

permissions:
  id-token: write # Needed for OIDC
  contents: write # Needed to push commits

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: chirag-retail-store/ui

jobs:
  build-and-push-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_IAM_Role }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Define image tags
        id: vars
        run: |
          SHA_TAG=sha-${GITHUB_SHA::7}
          IMAGE_BASE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "IMAGE_BASE=$IMAGE_BASE" >> $GITHUB_ENV
          echo "TAGS=latest $SHA_TAG" >> $GITHUB_ENV
          echo "Using tags: latest and $SHA_TAG"
          echo "latest = convenience tag for testing"
          echo "$SHA_TAG = immutable tag used in Helm values"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: Day-18_27-05-2026_GitOps_ArgoCD/github-files/src/ui
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest,${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Git auth using GITHUB_TOKEN
        run: |
          git config --global user.name "github-bot"
          git config --global user.email "github-bot@TankChirag-1212.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Update Helm values file with new image tag
        run: |
          cd Day-18_27-05-2026_GitOps_ArgoCD/github-files/src/ui
          git config user.name "github-bot"
          git config user.email "github-bot@TankChirag-1212.com"
          sed -i "s|^  tag: .*|  tag: sha-${GITHUB_SHA::7}|" chart/values-ui.yaml
          git diff --quiet || (
            git add chart/values-ui.yaml
            git commit -m "Update UI image tag to sha-${GITHUB_SHA::7}"
            git push origin master
          )

      - name: CI Complete
        run: |
          echo "Image push and Git update done"
          echo "Tags used: latest, sha-${GITHUB_SHA::7}"
